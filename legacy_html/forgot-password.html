<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OperaIQ — Recuperar Senha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-primary: #0052CC;
      --blue-hover:   #0065FF;
      --blue-mid:     #2684FF;
      --text-dark:    #172B4D;
      --text-mid:     #42526E;
      --text-light:   #6B778C;
      --border:       #DFE1E6;
      --bg:           #F4F5F7;
      --white:        #FFFFFF;
      --red:          #DE350B;
      --green:        #36B37E;
      --radius:       3px;
      --shadow-lg:    0 8px 16px rgba(9,30,66,.15), 0 0 1px rgba(9,30,66,.31);
    }
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text-dark);
    }
    .page { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      height: 56px; background: var(--white); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px;
    }
    .topbar-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .topbar-logo-name { font-size: 18px; font-weight: 700; color: var(--blue-primary); letter-spacing: -0.3px; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    
    .card { background: var(--white); border-radius: 3px; box-shadow: var(--shadow-lg); width: 100%; max-width: 400px; overflow: hidden; }
    .card-header { background: var(--blue-primary); padding: 32px 40px 28px; text-align: center; }
    .card-header-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 4px; }
    .card-header-logo-name { font-size: 22px; font-weight: 700; color: var(--white); letter-spacing: -0.5px; }
    .card-body { padding: 32px 40px 36px; }
    .form-title { font-size: 20px; font-weight: 600; color: var(--text-dark); margin-bottom: 4px; }
    .form-subtitle { font-size: 13px; color: var(--text-light); margin-bottom: 28px; line-height: 1.5; }
    
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-mid); margin-bottom: 6px; text-transform: uppercase; }
    .input-wrap { position: relative; }
    .input-wrap > svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-light); pointer-events: none; transition: color 0.15s; }
    .form-input {
      width: 100%; height: 44px; padding: 0 12px 0 40px; border: 2px solid var(--border);
      border-radius: var(--radius); font-size: 14px; font-family: inherit; color: var(--text-dark); transition: border-color 0.15s; outline: none;
    }
    .form-input:focus { border-color: var(--blue-mid); }
    .form-input:focus + svg, .input-wrap:focus-within > svg { color: var(--blue-mid); }
    .form-input.error { border-color: var(--red); }
    .field-error { font-size: 12px; color: var(--red); margin-top: 5px; display: none; }
    .field-error.visible { display: block; }
    
    .btn-primary {
      display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; height: 44px;
      background: var(--blue-primary); color: var(--white); border: none; border-radius: var(--radius);
      font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--blue-hover); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
    
    .card-footer { border-top: 1px solid var(--border); padding: 20px 40px; text-align: center; background: #FAFBFC; }
    .card-footer p { font-size: 13px; color: var(--text-light); }
    .card-footer a { color: var(--blue-primary); text-decoration: none; font-weight: 600; }
    .card-footer a:hover { text-decoration: underline; }

    .alert { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: var(--radius); margin-bottom: 20px; font-size: 13px; line-height: 1.5; }
    .alert-success { background: #E3FCEF; border: 1px solid #57D9A3; color: #006644; }
    .alert-error { background: #FFEBE6; border: 1px solid #FF8F73; color: #BF2600; }
    .alert svg { flex-shrink: 0; margin-top: 1px; }

    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="page">
  <header class="topbar">
    <a href="index.html" class="topbar-logo">
      <svg width="24" height="24" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="28" height="28" rx="6" fill="#0052CC"/><path d="M14 5L22 10V18L14 23L6 18V10L14 5Z" fill="white" opacity="0.9"/></svg>
      <span class="topbar-logo-name">OperaIQ</span>
    </a>
  </header>

  <main class="main">
    <div class="card">
      <div class="card-header">
        <div class="card-header-logo">
          <svg width="32" height="32" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="rgba(255,255,255,0.15)"/><path d="M14 5L22 10V18L14 23L6 18V10L14 5Z" fill="rgba(255,255,255,0.9)"/><path d="M14 9L19 12V17L14 20L9 17V12L14 9Z" fill="#0052CC" opacity="0.8"/><path d="M14 12.5L16.5 14V17L14 18.5L11.5 17V14L14 12.5Z" fill="white"/></svg>
          <span class="card-header-logo-name">OperaIQ</span>
        </div>
      </div>
      <div class="card-body">
        <h1 class="form-title">Recuperar Senha</h1>
        <p class="form-subtitle">Insira seu e-mail abaixo. Se encontrarmos uma conta associada, enviaremos instruções para redefinir sua senha.</p>
        
        <div class="alert alert-success" id="alert-box" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          <span id="alert-msg"></span>
        </div>

        <form id="forgot-form" novalidate>
          <div class="form-group" id="group-email">
            <label class="form-label" for="email">E-mail</label>
            <div class="input-wrap">
              <input class="form-input" type="email" id="email" placeholder="voce@empresa.com" required />
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M1.5 5l6.5 4.5L14.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
            <p class="field-error" id="email-error">Insira um e-mail válido.</p>
          </div>

          <button class="btn-primary" type="submit" id="btn-submit">
            <span class="spinner" id="spinner"></span>
            <span id="btn-text">Enviar Link de Recuperação</span>
          </button>
        </form>
      </div>
      <div class="card-footer">
        <p>Lembrou da senha? <a href="login.html">Voltar ao Login</a></p>
      </div>
    </div>
  </main>
</div>

<script>
  const form = document.getElementById('forgot-form');
  const emailInput = document.getElementById('email');
  const emailErr = document.getElementById('email-error');
  const alertBox = document.getElementById('alert-box');
  const alertMsg = document.getElementById('alert-msg');
  const btnSubmit = document.getElementById('btn-submit');
  const btnText = document.getElementById('btn-text');
  const spinner = document.getElementById('spinner');
  
  function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.style.display = 'none';
    
    if (!validateEmail(emailInput.value.trim())) {
      emailInput.classList.add('error');
      emailErr.classList.add('visible');
      return;
    }
    emailInput.classList.remove('error');
    emailErr.classList.remove('visible');

    btnSubmit.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Enviando...';

    const { data, error } = await window.supabaseClient.auth.resetPasswordForEmail(emailInput.value.trim());

    document.getElementById('group-email').style.display = 'none';
    btnSubmit.style.display = 'none';
    
    alertBox.style.display = 'flex';
    alertBox.className = 'alert alert-success';
    
    if (error) {
      alertBox.className = 'alert alert-error';
      alertMsg.textContent = 'Ocorreu um erro. Tente novamente mais tarde.';
      console.error(error);
    } else {
      alertMsg.textContent = 'Se o e-mail estiver cadastrado, você receberá um link de recuperação em breve.';
    }
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
</body>
</html>
